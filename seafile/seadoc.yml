services:

  seadoc:
    image: ${SEADOC_IMAGE:-seafileltd/sdoc-server:2.0-latest}
    container_name: seadoc
    restart: unless-stopped
    volumes:
      - ${SEADOC_VOLUME:-/opt/seadoc-data/}:/shared
    # ports:
    #   - "80:80"
    environment:
      - DB_HOST=${SEAFILE_MYSQL_DB_HOST:-db}
      - DB_PORT=${SEAFILE_MYSQL_DB_PORT:-3306}
      - DB_USER=${SEAFILE_MYSQL_DB_USER:-seafile}
      - DB_PASSWORD=${SEAFILE_MYSQL_DB_PASSWORD:?Variable is not set or empty}
      - DB_NAME=${SEADOC_MYSQL_DB_NAME:-${SEAFILE_MYSQL_DB_SEAHUB_DB_NAME:-seahub_db}}
      - TIME_ZONE=${TIME_ZONE:-Etc/UTC}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY:?Variable is not set or empty}
      - NON_ROOT=${NON_ROOT:-false}
      - SEAHUB_SERVICE_URL=${SEAFILE_SERVICE_URL:-http://seafile}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.seadoc.entrypoints=web"
      - "traefik.http.routers.seadoc.rule=Host(`drive.gyurus.hu`) && (Path(`/sdoc-server`) || PathPrefix(`/sdoc-server/`))"
      - "traefik.http.services.seadoc-svc.loadbalancer.server.port=80"
      - "traefik.http.routers.seadoc.service=seadoc-svc"
      - "traefik.http.middlewares.seadoc-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.seadoc.middlewares=seadoc-headers"
      - "traefik.http.routers.seadoc.priority=100"
      
      - "traefik.http.routers.seadoc-socket.rule=Host(`seafile.gyurus.hu`) && PathPrefix(`/socket.io`)"
      - "traefik.http.routers.seadoc-socket.entrypoints=websecure"
      - "traefik.http.routers.seadoc-socket.tls=true"
      - "traefik.http.routers.seadoc-socket.tls.certresolver=letsencrypt"
      - "traefik.http.routers.seadoc-socket.priority=100"
      - "traefik.http.routers.seadoc-socket.service=seadoc-svc"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - seafile-net

networks:
  seafile-net:
    name: seafile-net
