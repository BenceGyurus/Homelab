version: '3.8'

services:
  wifi-densepose:
    image: ruvnet/wifi-densepose:latest
    container_name: ruview_server
    ports:
      - "3000:3000"
      - "5005:5005/udp"
      - "3001:3001"
    environment:
      - SENSING_ALLOWED_HOSTS=192.168.100.39,192.168.100.39:3000,192.168.100.46,192.168.100.46:3000
      - CSI_SOURCE=esp32
    restart: unless-stopped