global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # --- Prometheus itself ---
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  # --- Proxmox Exporter ---
  - job_name: 'pve'
    static_configs:
      - targets:
        - 192.168.1.70  # Proxmox VE node.
    metrics_path: /pve
    params:
      module: [default]
      cluster: ['1']
      node: ['1']
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 192.168.1.17:9221

  # --- MikroTik Exporter ---
  - job_name: 'mktxp'
    static_configs:
      - targets: ['192.168.1.17:49090']
  
  - job_name: 'adguard'
    static_configs:
      - targets: ['192.168.1.17:9618']
  
  - job_name: 'treafik'
    static_configs:
      - targets: ['192.168.1.17:9100']
        labels:
          alias: localhost

