global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # --- Prometheus itself ---
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  # --- Proxmox Exporter ---
  - job_name: 'pve'
    static_configs:
      - targets:
        - 192.168.1.70  # Proxmox VE node.
    metrics_path: /pve
    params:
      module: [default]
      cluster: ['1']
      node: ['1']
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 192.168.1.17:9221

  # --- MikroTik Exporter ---
  - job_name: 'mktxp'
    static_configs:
      - targets: ['192.168.1.17:49090']

  # --- Adguard Exporter ----
  
  - job_name: 'adguard'
    static_configs:
      - targets: ['192.168.1.17:9618']

  # --- Treafik Exporter ----
  
  - job_name: 'treafik'
    scrape_interval: 5s
    metrics_path: /metrics
    static_configs:
      - targets: ['192.168.1.17:8080']

  - job_name: 'immich'
    scrape_interval: 5s
    metrics_path: /metrics
    static_configs:
      - targets: ['192.168.1.17:8081']
  
  - job_name: 'proxmox-smart'
    metrics_path: /metrics
    static_configs:
      - targets: ['192.168.1.70:9633']
  
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['192.168.1.17:8082']

  - job_name: 'node'
    static_configs:
      - targets: ['192.168.1.17:9101']
  
  - job_name: 'docker'
    static_configs:
      - targets: ['host.docker.internal:9323']
  
  - job_name: 'cadvisor-torrent'
    static_configs:
      - targets: ['192.168.1.85:8082']

  - job_name: 'node-torrent'
    static_configs:
      - targets: ['192.168.1.85:9101']


