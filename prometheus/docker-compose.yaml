services:
  # --- InfluxDB ---
  influxdb2:
    image: influxdb:2
    ports:
      - 8086:8086
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME_FILE: /run/secrets/influxdb2-admin-username
      DOCKER_INFLUXDB_INIT_PASSWORD_FILE: /run/secrets/influxdb2-admin-password
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN_FILE: /run/secrets/influxdb2-admin-token
      DOCKER_INFLUXDB_INIT_ORG: docs
      DOCKER_INFLUXDB_INIT_BUCKET: home
    secrets:
      - influxdb2-admin-username
      - influxdb2-admin-password
      - influxdb2-admin-token
    volumes:
      - type: volume
        source: influxdb2-data
        target: /mnt/hdd/influxdb2-data
      - type: volume
        source: influxdb2-config
        target: /mnt/hdd/influxdb2-config

  # --- Prometheus ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    networks:
      - internal
    ports:
      - "9090:9090"
    volumes:
      - /mnt/hdd/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /mnt/hdd/prometheus:/prometheus
    restart: unless-stopped

  # --- Grafana ---
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.grafana.entrypoints=web"
      - "traefik.http.routers.grafana.rule=Host(`grafana.gyurus.hu`)"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.grafana-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.grafana.middlewares=grafana-headers"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://grafana.gyurus.hu
    volumes:
      - /mnt/hdd/grafana:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  adguard-exporter:
    image: ghcr.io/henrywhitaker3/adguard-exporter:latest
    container_name: adguard-exporter
    env_file:
      - path: ../stack.env
        required: true
    ports:
      - "9618:9618"
    environment:
      ADGUARD_SERVERS: ${ADGUARD_SERVERS}
      ADGUARD_USERNAMES: ${ADGUARD_USERNAMES}
      ADGUARD_PASSWORDS: ${ADGUARD_PASSWORDS}
      INTERVAL: "15s"
    restart: unless-stopped

networks:
  internal:
    driver: bridge
  proxy:
    external: true
secrets:
  influxdb2-admin-username:
    file: /mnt/hdd/influx/.env.influxdb2-admin-username
  influxdb2-admin-password:
    file: /mnt/hdd/influx/.env.influxdb2-admin-password
  influxdb2-admin-token:
    file: /mnt/hdd/influx/.env.influxdb2-admin-token
volumes:
  influxdb2-data:
  influxdb2-config: