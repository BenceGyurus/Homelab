services:
  uptime-kuma:
    image: louislam/uptime-kuma:2
    restart: unless-stopped
    volumes:
      - /mnt/hdd/uptime-kuma:/app/data
    environment:
      - URL=https://status.gyurus.hu
    networks:
      - internal
      - proxy
    
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.uptime.entrypoints=web"
      - "traefik.http.routers.uptime.rule=Host(`status.gyurus.hu`)"
      - "traefik.http.services.uptime.loadbalancer.server.port=3001"
      - "traefik.http.middlewares.uptime-headers.headers.customrequestheaders.X-Forwarded-Proto=http"
      - "traefik.http.routers.uptime.middlewares=uptime-headers"

networks:
  internal:
    driver: bridge
  proxy:
    external: true