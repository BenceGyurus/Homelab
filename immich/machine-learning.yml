version: "3.8"
name: immich-machine-learning

services:

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:release-cuda
    ports:
      - "3003:3003"
    volumes:
      - ./immich/immich-model-cache:/cache
    env_file:
      - ../stack.env
    restart: always
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu
        limits:
          cpus: "2"
          memory: 10g