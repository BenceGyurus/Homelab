services:
  transmission:
    image: lscr.io/linuxserver/transmission:latest
    container_name: transmission
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./data/tramission:/config
      - ./data:/data
      - ./data/transmission/watch:/watch 
    ports:
      - 9091:9091
      - 51413:51413
      - 51413:51413/udp
    restart: unless-stopped
    networks:
      media-server:
        ipv4_address: 10.5.0.5
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./data/sonarr:/config
      - ./data:/data
    ports:
      - 8989:8989
    restart: unless-stopped
    networks:
      media-server:
        ipv4_address: 10.5.0.6
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./data/radarr:/config
      - ./data:/data
    ports:
      - 7878:7878
    restart: unless-stopped
    networks:
      media-server:
        ipv4_address: 10.5.0.7
  jellyseerr:
    image: fallenbagel/jellyseerr:preview-music-support
    container_name: jellyseerr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./data/jellyseerr:/config
    ports:
      - 5055:5055
    restart: unless-stopped
    networks:
      media-server:
        ipv4_address: 10.5.0.8
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./data/powlarr:/config
    ports:
      - 9696:9696
    restart: unless-stopped
    networks:
      media-server:
        ipv4_address: 10.5.0.9
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    ports:
      - 8096:8096/tcp
      - 7359:7359/udp
    volumes:
      - ./data/jellyfin/config:/config
      - ./data/jellyfin/cache:/cache
      - type: bind
        source: ./data/media
        target: /media
        read_only: true
      - type: bind
        source: ./data/fonts
        target: /usr/local/share/fonts/custom
        read_only: true
    restart: 'unless-stopped'
    environment:
      - JELLYFIN_PublishedServerUrl=http://tv.gyurus.hu
    extra_hosts:
      - 'host.docker.internal:host-gateway'
  plex:
    image: plexinc/pms-docker:latest
    privileged: true
    container_name: plex
    network_mode: host
    devices:
    - /dev/bus/usb:/dev/bus/usb
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Budapest
      - ADVERTISE_IP=https://stream.gyurus.hu
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./data/plexmediaserver:/config
      - ./data/media:/mnt/tv
      - ./data/media:/mnt/movies
    restart: unless-stopped
  homarr:
    container_name: homarr
    image: ghcr.io/homarr-labs/homarr:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/homarr:/appdata
    environment:
      - SECRET_ENCRYPTION_KEY=f3f63ef1606dde447d19e784b0b2528b2b9a895215ed7e48d96beeab774a251c
    ports:
      - '7575:7575'
  profilarr:
    image: santiagosayshey/profilarr:latest
    container_name: profilarr
    ports:
      - 6868:6868
    volumes:
      - ./data/profilarr:/config
    environment:
      - TZ=Europe/Budapest
    restart: unless-stopped
  wizarr:
    container_name: wizarr
    image: ghcr.io/wizarrrr/wizarr
    ports:
      - 5690:5690
    volumes:
      - ./data/wizarr:/data
    environment:
      - PUID=1000
      - PGID=1000
      - DISABLE_BUILTIN_AUTH=false
      - TZ=Europe/Budapest
  navidrome:
    image: deluan/navidrome:latest
    user: 1000:1000
    ports:
      - "4533:4533"
    restart: unless-stopped
    volumes:
      - "./navidome:/data"
      - "./data/music:/music:ro"
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ./data/lidarr:/config
      - ./data/music:/music
      - ./data:/data
    ports:
      - 8686:8686
    restart: unless-stopped
  sonashow:
    image: thewicklowwolf/sonashow:latest
    container_name: sonashow
    environment:
      - PUID=1000
      - PGID=1000
      - root_folder_path=/data/tv
      - sonarr_api_key=a2f29a5930a14826add0616ae0dc5ca1
      - sonarr_address=http://192.168.1.85:8989
    volumes:
      - ./data/sonashow:/sonashow/config
      - ./data/media/:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 5000:5000
    restart: unless-stopped
networks:
  media-server:
    name: media-server
    driver: bridge
    ipam:
      config:
        - subnet: 10.5.0.0/16
          gateway: 10.5.0.1