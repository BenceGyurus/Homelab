  #   command:
  #     ["--config", "/app/config.yaml", "--port", "4000", "--detailed_debug"]
  #   restart: always
  #   networks:
  #     - internal

  open-webui:
    image: ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG-latest}
    container_name: open-webui
    networks:
      - proxy
      - internal
    environment:
      - "OPENAI_API_BASE_URL=http://litellm:4000"
      - "OPENAI_API_KEY=any-random-string"
      - "OLLAMA_BASE_URL=http://192.168.1.46:11434"
    volumes:
      - /mnt/hdd/openwebui:/app/backend/data
    ports:
      - ${OPEN_WEBUI_PORT-3003}:8080
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.openwebui.entrypoints=web"
      - "traefik.http.routers.openwebui.rule=Host(`chat.gyurus.hu`)"
      - "traefik.http.services.openwebui.loadbalancer.server.port=8080"
      - "traefik.http.middlewares.openwebui-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.openwebui.middlewares=openwebui-headers"

 
volumes:
  open-webui:

networks:
  internal:
    external: false
  proxy:
    external: true
