---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: homepage
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homepage-cluster-role
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "namespaces", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homepage-cluster-role-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: homepage-cluster-role
subjects:
  - kind: ServiceAccount
    name: homepage
    namespace: default

---
# 2. CONFIGMAP - A beállításaid
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: default
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: ""
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: |
    - Fejlesztés:
        - Github:
            - abbr: GH
              href: https://github.com/
  services.yaml: |
    - Otthon:
        - Home Assistant:
            icon: home-assistant.png
            href: https://home.gyurus.hu
            description: Okosotthon vezérlés
    - Biztonság:
        - Authentik:
            icon: authentik.png
            href: https://auth.gyurus.hu
            description: Identitáskezelés

    - Tárhely és Dokumentumok:
            - Immich:
                icon: immich.png
                href: https://photos.gyurus.hu
                description: Fotómentés és galéria
            - Seafile:
                icon: seafile.png
                href: https://drive.gyurus.hu
                description: Felhő tárhely
            - Paperless-ngx:
                icon: paperless-ngx.png
                href: https://paperless.gyurus.hu
                description: Digitális irattár
            - Affine:
                icon: affine.png
                href: https://notes.gyurus.hu
                description: Jegyzetek és Tudásbázis

    - Média:
        - Jellyfin:
            icon: jellyfin.png
            href: https://tv.gyurus.hu
            description: Filmek és sorozatok
        - Jellyseerr:
            icon: jellyseerr.png
            href: https://sorozat.gyurus.hu
            description: Média igénylés

    - Egyéb Eszközök:
        - Maildrop:
            icon: mail.png
            href: https://maildrop.gyurus.hu
            description: Ideiglenes email fiók
        - Forgejo:
            icon: forgejo.png
            href: https://git.gyurus.hu
            description: Git verziókezelő
        - SearXNG:
            icon: searxng.png
            href: https://search.gyurus.hu
            description: Privát keresőmotor

  widgets.yaml: |
    - search:
        provider: custom
        url: https://search.gyurus.hu/search?q=
        target: _blank
  docker.yaml: ""

---
# 3. SERVICE - (Javítva: spec alatt vannak a portok)
apiVersion: v1
kind: Service
metadata:
  name: homepage
  namespace: default
  labels:
    app.kubernetes.io/name: homepage
spec:
  type: ClusterIP
  ports:
    - port: 80 # A klaszteren belüli port (erre mutat az Ingress)
      targetPort: 3000 # A konténer portja
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: homepage

---
# 4. DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: default
  labels:
    app.kubernetes.io/name: homepage
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage
    spec:
      serviceAccountName: homepage
      automountServiceAccountToken: true
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      containers:
        - name: homepage
          image: "ghcr.io/gethomepage/homepage:latest"
          imagePullPolicy: Always
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "gyurus.hu,gethomepage.dev" # Hozzáadva a domained a biztonság kedvéért
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          volumeMounts:
            # Egyenként mountoljuk a config fájlokat, hogy ne írjuk felül az egész mappát
            - mountPath: /app/config/custom.js
              name: homepage-config
              subPath: custom.js
            - mountPath: /app/config/custom.css
              name: homepage-config
              subPath: custom.css
            - mountPath: /app/config/bookmarks.yaml
              name: homepage-config
              subPath: bookmarks.yaml
            - mountPath: /app/config/docker.yaml
              name: homepage-config
              subPath: docker.yaml
            - mountPath: /app/config/kubernetes.yaml
              name: homepage-config
              subPath: kubernetes.yaml
            - mountPath: /app/config/services.yaml
              name: homepage-config
              subPath: services.yaml
            - mountPath: /app/config/settings.yaml
              name: homepage-config
              subPath: settings.yaml
            - mountPath: /app/config/widgets.yaml
              name: homepage-config
              subPath: widgets.yaml
            - mountPath: /app/config/logs
              name: logs
      volumes:
        - name: homepage-config
          configMap:
            name: homepage
        - name: logs
          emptyDir: {}

---
# 5. INGRESS ROUTE (Traefik)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homepage-ingress
  namespace: default
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`gyurus.hu`)
      kind: Rule
      services:
        - name: homepage
          port: 80 # Ez most már egyezik a Service portjával
