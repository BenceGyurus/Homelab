services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    ports:
      - 3000:3000
    volumes:
      - /path/to/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      HOMEPAGE_ALLOWED_HOSTS: gyurus.hu
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.home.entrypoints=web"
      - "traefik.http.routers.home.rule=Host(`gyurus.hu`)"
      - "traefik.http.services.home.loadbalancer.server.port=9000"
      - "traefik.http.middlewares.home-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.home.middlewares=home-headers"
