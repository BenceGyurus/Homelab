global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

defaults
    log global
    mode tcp
    option tcplog
    timeout connect 10s
    timeout client  30m
    timeout server  30m
    timeout tunnel  1h
    option tcpka

frontend http_front
    bind *:80
    mode tcp
    stick-table type ip size 1m expire 10m store conn_rate(10s),conn_cur
    tcp-request connection track-sc0 src
    tcp-request connection reject if { sc0_conn_rate gt 100 }
    tcp-request connection reject if { sc0_conn_cur gt 60 }
    default_backend traefik_http

frontend https_front
    bind *:443
    mode tcp

    stick-table type ip size 1m expire 10m store conn_rate(10s),conn_cur

    tcp-request connection track-sc0 src
    tcp-request connection reject if { sc0_conn_rate gt 50 }
    tcp-request connection reject if { sc0_conn_cur gt 30 }

    tcp-request inspect-delay 5s
    tcp-request content accept if { req_ssl_hello_type 1 }

    use_backend traefik_https if { req.ssl_sni -m end .gyurus.hu }
        use_backend traefik_https if { req.ssl_sni gyurus.hu }

    default_backend traefik_https

backend traefik_http
    mode tcp
    server traefik loadbalancer:80 check

backend traefik_https
    mode tcp
    server traefik loadbalancer:443 check


frontend mc_front
    bind *:25500-25600
    mode tcp

    stick-table type ip size 1m expire 10m store conn_rate(10s),conn_cur
    tcp-request connection track-sc0 src
    tcp-request connection reject if { sc0_conn_rate gt 20 }

    default_backend mc_backend

backend mc_backend
    mode tcp
    server traefik loadbalancer