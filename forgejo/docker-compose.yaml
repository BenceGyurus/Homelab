networks:
  forgejo:
    external: false
  proxy:
    external: true

services:
  server:
    image: codeberg.org/forgejo/forgejo:13
    container_name: forgejo
    env_file:
      - ../stack.env
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - FORGEJO__database__DB_TYPE=postgres
      - FORGEJO__database__HOST=db:5432
      - FORGEJO__database__NAME=${FORGEJO__database__NAME}
      - FORGEJO__database__USER=${FORGEJO__database__USER}
      - FORGEJO__database__PASSWD=${FORGEJO__database__PASSWD}
    restart: always
    networks:
      - forgejo
      - proxy
    volumes:
      - /mnt/hdd/forgejo/data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.forgejo.entrypoints=web"
      - "traefik.http.routers.forgejo.rule=Host(`git.gyurus.hu`)"
      - "traefik.http.services.forgejo.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.forgejo-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.forgejo.middlewares=forgejo-headers"
    ports:
      - "222:22"
    depends_on:
      - db

  db:
    image: postgres:14
    restart: always
    env_file:
      - ../stack.env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - forgejo
    volumes:
      - /mnt/hdd/forgejo/db:/var/lib/postgresql/data

  docker-in-docker:
      image: docker:dind
      container_name: docker_dind
      privileged: true
      command: ['dockerd', '-H', 'tcp://0.0.0.0:2375', '--tls=false']
      restart: unless-stopped
      networks:
        - forgejo

  runner:
      image: codeberg.org/forgejo/runner:3.5.1
      container_name: runner
      restart: unless-stopped
      depends_on:
        docker-in-docker:
          condition: service_started
        server:
          condition: service_started
      networks:
        - forgejo
      volumes:
        # Itt adjuk át a konfigurációs fájlt és a runner adatait
        - ./runner-config.yml:/data/runner-config.yml
        - /mnt/hdd/forgejo/runner:/data
      environment:
        - DOCKER_HOST=tcp://docker-in-docker:2375
        # FONTOS: DinD esetén a külső, publikus URL-t használd, különben a belső konténerek nem érik el a Git-et!
        - FORGEJO_INSTANCE_URL=https://git.gyurus.hu
        - FORGEJO_RUNNER_REGISTRATION_TOKEN=${yQlkESV5OjFBLgKvTWWHVTQSvDHqovjaGOaMQIw3}
        - FORGEJO_RUNNER_NAME=dind-runner
        - FORGEJO_RUNNER_LABELS=ubuntu-latest:docker://catthehacker/ubuntu:act-latest
      command: 'forgejo-runner daemon --config /data/runner-config.yml'