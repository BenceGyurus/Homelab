networks:
  forgejo:
    external: false
  proxy:
    external: true

services:
  server:
    image: codeberg.org/forgejo/forgejo:13
    container_name: forgejo
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - FORGEJO__database__DB_TYPE=postgres
      - FORGEJO__database__HOST=db:5432
      - FORGEJO__database__NAME=${FORGEJO__database__NAME}
      - FORGEJO__database__USER=${FORGEJO__database__USER}
      - FORGEJO__database__PASSWD=${FORGEJO__database__PASSWD}
    restart: always
    networks:
      - forgejo
      - proxy
    volumes:
      - /mnt/hdd/forgejo/data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.forgejo.entrypoints=web"
      - "traefik.http.routers.forgejo.rule=Host(`git.gyurus.hu`)"
      - "traefik.http.services.forgejo.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.forgejo-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.forgejo.middlewares=forgejo-headers"
    ports:
      - "222:22"
    depends_on:
      - db

  db:
    image: postgres:14
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - forgejo
    volumes:
      - /mnt/hdd/forgejo/db:/var/lib/postgresql/data

  # --- ÚJ RUNNER SZERVIZ ---
  runner:
    image: data.forgejo.org/forgejo/runner:12
    restart: always
    depends_on:
      - server
    networks:
      - forgejo
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /mnt/hdd/forgejo/runner:/data
    environment:
      - FORGEJO_INSTANCE_URL=http://server:3000
      - FORGEJO_RUNNER_REGISTRATION_TOKEN=${FORGEJO_RUNNER_REGISTRATION_TOKEN}
      - FORGEJO_RUNNER_NAME=my-docker-runner
      - FORGEJO_RUNNER_LABELS=ubuntu-latest:docker://catthehacker/ubuntu:act-latest,ubuntu-22.04:docker://catthehacker/ubuntu:act-22.04