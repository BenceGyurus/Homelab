networks:
  forgejo:
    external: false
  proxy:
    external: true

services:
  server:
    image: codeberg.org/forgejo/forgejo:13
    container_name: forgejo
    env_file:
      - ../stack.env
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - FORGEJO__database__DB_TYPE=postgres
      - FORGEJO__database__HOST=db:5432
      - FORGEJO__database__NAME=${FORGEJO__database__NAME}
      - FORGEJO__database__USER=${FORGEJO__database__USER}
      - FORGEJO__database__PASSWD=${FORGEJO__database__PASSWD}
    restart: always
    networks:
      - forgejo
      - proxy
    volumes:
      - /mnt/hdd/forgejo/data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.forgejo.entrypoints=web"
      - "traefik.http.routers.forgejo.rule=Host(`git.gyurus.hu`)"
      - "traefik.http.services.forgejo.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.forgejo-buffering.buffering.maxRequestBodyBytes=0"
      - "traefik.http.middlewares.forgejo-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.forgejo.middlewares=forgejo-buffering,forgejo-headers"
    ports:
      - "222:22"
    depends_on:
      - db

  db:
    image: postgres:14
    restart: always
    env_file:
      - ../stack.env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - forgejo
    volumes:
      - /mnt/hdd/forgejo/db:/var/lib/postgresql/data


  forgejo-runner:
    image: gitea/act_runner:latest
    user: root
    privileged: true
    env_file:
      - ../stack.env
    volumes:
      - /mnt/hdd/forgejo/runner:/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Használjuk a rendes címet, ahogy a Forgejo elvárja
      GITEA_INSTANCE_URL: http://git.gyurus.hu
      GITEA_RUNNER_REGISTRATION_TOKEN: ${FORGEJO_RUNNER_REGISTRATION_TOKEN}
      # Ez a változó kényszeríti a belső Go klienst, hogy hagyja ki a TLS ellenőrzést
      GITEA_RUNNER_INSECURE: "true"
      # Biztonsági játékból a curl-nek is átadjuk
      CURL_INSECURE: "true"
    command: forgejo-runner daemon --config /data/config.yml
    extra_hosts:
      - "git.gyurus.hu:host-gateway"
    networks:
      - proxy      
      - forgejo
    restart: always
    depends_on:
      - server